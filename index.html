  <style>
    :root {
      --ink: #f5f2ea;
      --muted: rgba(245, 242, 234, .67);
      --line: rgba(255, 255, 255, .18);
      --accent: #e5a54b;
      --dark: #0b0d0d;
    }
    body { margin: 0; background: var(--dark); color: var(--ink); font-family: "DM Sans", sans-serif; }

    /* Sequential Fading Gallery (Upper Left) */
    .sequential-gallery {
      position: absolute; top: 100px; left: 40px; z-index: 5;
      width: 260px; height: 170px; pointer-events: none;
    }
    .seq-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: contain; padding: 8px;
      background: rgba(11, 13, 13, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      opacity: 0;
      transform: scale(0.95);
      animation: fadeSequence 40s infinite;
    }
    @keyframes fadeSequence {
      0%, 5% { opacity: 0; transform: scale(0.95); }
      10%, 20% { opacity: 1; transform: scale(1); }
      25%, 100% { opacity: 0; transform: scale(0.95); }
    }
    .seq-img:nth-child(1) { animation-delay: 0s; }
    .seq-img:nth-child(2) { animation-delay: 5s; }
    .seq-img:nth-child(3) { animation-delay: 10s; }

    /* Portal Structure */
    .portal-grid { display: flex; min-height: 100vh; }
    .portal { position: relative; flex: 1 1 50%; overflow: hidden; border-right: 1px solid var(--line); }
    
    /* Hero Background Images (Cover) */
    .portal > img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; /* Backgrounds should cover the portal */
    }

    .portal-shade { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.2), rgba(0,0,0,0.8)); }
    
    .portal-content {
      position: absolute; bottom: 40px; left: 40px; z-index: 3;
      max-width: 400px; padding: 28px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border-radius: 22px; border: 1px solid rgba(255,255,255,0.1);
    }

    /* Standard Elements */
    .site-header { position: fixed; top: 0; width: 100%; padding: 24px; z-index: 20; display: flex; justify-content: space-between; align-items: center; }
    .portal-label { color: var(--accent); font-weight: 700; font-size: 10px; letter-spacing: .2em; text-transform: uppercase; }
    h2 { font-size: 48px; line-height: 1; margin: 15px 0; }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="brand" href="#">SNAIJA</a>
    <button class="menu-button" data-open-modal="General enquiry">Menu</button>
  </header>

  <main class="portal-shell">
    <!-- Fading Gallery -->
    <div class="sequential-gallery">
        <img src="gal (1).jpg" class="seq-img">
        <img src="gal (2).jpg" class="seq-img">
        <img src="gal (3).jpg" class="seq-img">
    </div>

    <div class="portal-grid">
      <!-- Construction Portal -->
      <article class="portal">
        <img src="construction.png" alt="Building site">
        <div class="portal-shade"></div>
        <div class="portal-content">
          <p class="portal-label">SNAIJA WORKS</p>
          <h2>Building<br>Construction</h2>
          <button class="explore" data-open-modal="Construction project">Explore</button>
        </div>
      </article>

      <!-- Import Portal -->
      <article class="portal">
        <img src="imported-goods.png" alt="Imported goods">
        <div class="portal-shade"></div>
        <div class="portal-content">
          <p class="portal-label">SNAIJA VENTURES</p>
          <h2>General<br>Merchandise</h2>
          <button class="explore" data-open-modal="Imported goods">Browse</button>
        </div>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <!-- ... Restored Footer content ... -->
  </footer>

  <dialog class="contact-modal">
    <!-- ... Restored Modal content ... -->
  </dialog>

  <script src="script.js"></script>
</body>
