<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNAIJA Construction Engineering Ltd.</title>
  
  <style>
    :root {
      --ink: #f5f2ea;
      --accent: #e5a54b;
      --dark: #0b0d0d;
    }
    body { margin: 0; background: var(--dark); color: var(--ink); font-family: "DM Sans", sans-serif; }
    
    /* UPPER-LEFT FADING GALLERY */
    .sequential-gallery {
      position: absolute;
      top: 100px;
      left: 40px;
      z-index: 5;
      width: 260px;
      height: 170px;
      pointer-events: none;
    }
    
    .seq-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain; /* Aspect ratio preserved, full image visible */
      padding: 8px;
      background: rgba(11, 13, 13, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      opacity: 0;
      transform: scale(0.95);
      animation: fadeSequence 40s infinite;
    }

    @keyframes fadeSequence {
      0%, 5% { opacity: 0; transform: scale(0.95); }
      10%, 20% { opacity: 1; transform: scale(1); }
      25%, 100% { opacity: 0; transform: scale(0.95); }
    }

    /* Sequencing the images: Adjust delay (e.g., 2s per image) */
    .seq-img:nth-child(1) { animation-delay: 0s; }
    .seq-img:nth-child(2) { animation-delay: 2s; }
    .seq-img:nth-child(3) { animation-delay: 4s; }
    .seq-img:nth-child(4) { animation-delay: 6s; }
    .seq-img:nth-child(5) { animation-delay: 8s; }
    .seq-img:nth-child(6) { animation-delay: 10s; }
    /* Add more nth-child selectors for all your images */

    /* LOWER-LEFT TEXT CARDS */
    .portal-grid { display: flex; min-height: 100vh; }
    .portal { position: relative; flex: 1; overflow: hidden; }
    
    .portal-content {
      position: absolute;
      bottom: 40px;
      left: 40px;
      z-index: 3;
      max-width: 400px;
      padding: 28px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* General Styling */
    .site-header { position: fixed; top: 0; width: 100%; padding: 24px; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
    h2 { font-size: 40px; margin: 10px 0; }
    .portal-label { color: var(--accent); font-weight: bold; }
    
    @media (max-width: 768px) {
        .sequential-gallery { top: 80px; left: 20px; width: 200px; height: 130px; }
        .portal-content { bottom: 20px; left: 20px; right: 20px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="brand" href="#">SNAIJA</a>
    <button class="menu-button">Menu</button>
  </header>

  <main class="portal-shell">
    <!-- Gallery fades in upper left -->
    <div class="sequential-gallery">
        <img src="gal (1).jpg" class="seq-img">
        <img src="gal (2).jpg" class="seq-img">
        <img src="gal (3).jpg" class="seq-img">
        <!-- Add your remaining images here -->
    </div>

    <div class="portal-grid">
      <!-- Left Portal -->
      <article class="portal">
        <div class="portal-content">
          <p class="portal-label">SNAIJA WORKS</p>
          <h2>Building<br>Construction</h2>
          <p>From first sketch to final finish, we deliver solid spaces.</p>
          <button class="explore">Explore construction</button>
        </div>
      </article>

      <!-- Right Portal -->
      <article class="portal">
        <div class="portal-content">
          <p class="portal-label">SNAIJA VENTURES</p>
          <h2>General<br>Merchandise</h2>
          <p>Carefully sourced products from trusted global suppliers.</p>
          <button class="explore">Browse goods</button>
        </div>
      </article>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
